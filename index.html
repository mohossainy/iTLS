<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTLS | Integrated Trading & Logistics Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-blue: #0D203D; --main-orange: #B35B2D; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        
        /* Navbar - Premium Large Logo */
        .navbar { background: rgba(255, 255, 255, 0.98) !important; padding: 20px 0; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .navbar-brand img { 
            height: 125px; /* حجم أكبر لضمان وضوح كلمة Integrated الجديدة */
            width: auto; 
            transition: transform 0.3s ease;
        }
        .navbar-brand img:hover { transform: scale(1.02); }
        
        .nav-link { font-weight: 700; color: var(--main-blue) !important; text-transform: uppercase; margin: 0 15px; font-size: 0.9rem; }
        .btn-quote { background: var(--main-orange); color: white !important; border-radius: 50px; padding: 12px 35px; font-weight: 800; border: none; }

        /* Hero Section */
        .hero { 
            background: linear-gradient(rgba(13, 32, 61, 0.85), rgba(13, 32, 61, 0.85)), 
            url('https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
            color: white; padding: 220px 0; text-align: center;
        }
        .hero h1 { font-weight: 800; font-size: 3.8rem; line-height: 1.1; text-transform: uppercase; }
        .orange-text { color: var(--main-orange); }

        /* Footer */
        footer { background: #fff; padding: 80px 0 40px; border-top: 1px solid #eee; }
        .footer-logo { height: 130px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="tls logo.png" alt="iTLS Integrated Logo">
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
                </ul>
                <a href="#" class="btn btn-quote">GET A QUOTE</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>iTLS: <span class="orange-text">Integrated</span> Trading & Logistics Solutions</h1>
            <p class="lead mt-4 fw-bold">Connecting Markets through Seamless Logistics Excellence.</p>
            <div class="mt-5">
                <a href="#" class="btn btn-quote px-5 py-3 text-decoration-none">TRACK YOUR SHIPMENT</a>
            </div>
        </div>
    </header>

    <footer>
        <div class="container text-center">
            <img src="tls logo.png" class="footer-logo" alt="iTLS Integrated Logo">
            <div class="contact-info">
                <p class="mb-1 fw-bold text-dark">iTLS - Integrated Trading and Logistics Solutions</p>
                <p class="small text-secondary">© 2026 All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
