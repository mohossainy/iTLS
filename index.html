<!DOCTYPE html>
<html lang="en">
<head>

    <title>iTLS | Integrated Trading & Logistics Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-blue: #0D203D; --main-orange: #B35B2D; --dark-overlay: rgba(13, 32, 61, 0.85); }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #fff; scroll-behavior: smooth; }

        /* Navbar */
        .navbar { background: #fff !important; padding: 15px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-bottom: 4px solid var(--main-blue); }
        .navbar-brand img { height: 100px; width: auto; }
        .nav-link { font-weight: 800; color: var(--main-blue) !important; text-transform: uppercase; margin: 0 15px; font-size: 0.9rem; }

        /* Hero - Title Optimized */
        .hero { 
            background: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
            url('https://images.unsplash.com/photo-1494412519320-aa613dfb7738?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
            color: white; padding: 140px 0; text-align: center;
        }
        .hero h1 { font-weight: 800; }
        .hero .itls-line { color: var(--main-orange); font-size: 4.5rem; text-transform: none; display: block; margin-bottom: 20px; } /* لضمان ظهور iTLS بالشكل الصحيح */
        .hero h2 { font-weight: 800; font-size: 3.5rem; text-transform: uppercase; margin: 0; }

        /* Services Section */
        .services-section { padding: 100px 0; background: #f4f7f9; }
        .service-container {
            position: relative; height: 380px; border-radius: 20px;
            overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: 0.4s ease; cursor: pointer; margin-bottom: 30px;
        }
        .service-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; transition: 0.6s; z-index: 1;
        }
        .service-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(13,32,61,0.3), rgba(13,32,61,0.95));
            z-index: 2; transition: 0.4s;
        }
        .service-content {
            position: relative; z-index: 3; height: 100%;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 35px 25px; color: white; text-align: left;
        }
        .service-icon { font-size: 2.5rem; color: var(--main-orange); margin-bottom: 15px; }
        .service-container:hover .service-bg { transform: scale(1.1); }
        .service-container:hover .service-overlay { background: rgba(179, 91, 45, 0.85); }

        /* Modal Form */
        .modal-header { background: var(--main-blue); color: white; border-bottom: 4px solid var(--main-orange); }
        .btn-submit { background: var(--main-orange); color: white; font-weight: 800; border-radius: 50px; border: none; padding: 12px 30px; }

        /* Footer */
        footer { padding: 60px 0; background: #fff; border-top: 1px solid #eee; text-align: center; }
        .footer-logo { height: 90px; margin-bottom: 15px; }
    </style>
</head>
